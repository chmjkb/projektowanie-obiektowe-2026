version: '3.8'

services:
  app:
    image: kprzystalski/projobj-php:latest
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    working_dir: /app
    command: >
      sh -c "composer install --no-interaction &&
             php bin/console doctrine:schema:create --if-not-exists &&
             php -S 0.0.0.0:8000 -t public"
