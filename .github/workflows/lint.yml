name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  eslint:
    name: ESLint (LAB5/frontend)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: yarn
          cache-dependency-path: LAB5/frontend/yarn.lock

      - name: Install dependencies
        working-directory: LAB5/frontend
        run: yarn install --frozen-lockfile

      - name: Run ESLint
        working-directory: LAB5/frontend
        run: yarn lint
